# Template only — copy to secret.yaml, fill in real values, and apply
# out-of-band (never commit the filled-in version; k8s/secret.yaml is
# gitignored for exactly this reason). In a real deployment, prefer your
# cluster's secret manager (e.g. Sealed Secrets, External Secrets Operator,
# or your cloud provider's KMS-backed secret store) over `kubectl apply -f`
# with a plain Secret manifest.
apiVersion: v1
kind: Secret
metadata:
  name: estatecore-api-secrets
  namespace: estatecore
type: Opaque
stringData:
  # Managed Postgres (e.g. RDS, Cloud SQL) — not run in-cluster, see k8s/README.md.
  DATABASE_URL: 'postgres://USER:PASSWORD@HOST:5432/estatecore'
  # Managed Redis (e.g. ElastiCache, Memorystore) — not run in-cluster.
  REDIS_URL: 'redis://HOST:6379'
  # Generate with: node scripts/generate-dev-secrets.js (for a REAL deployment,
  # generate a fresh keypair the same way but never reuse the dev one).
  JWT_PRIVATE_KEY: 'REPLACE_WITH_ESCAPED_PEM_ONE_LINE'
  JWT_PUBLIC_KEY: 'REPLACE_WITH_ESCAPED_PEM_ONE_LINE'
  MFA_ENCRYPTION_KEY: 'REPLACE_WITH_OUTPUT_OF_openssl_rand_-hex_32'
  PAYSTACK_SECRET_KEY: 'sk_live_REPLACE_ME'
  PAYSTACK_PUBLIC_KEY: 'pk_live_REPLACE_ME'
