# Requires the metrics-server addon (present by default on most managed
# clusters — EKS/GKE/AKS all ship it or make it a one-line add-on install).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: estatecore-api
  namespace: estatecore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: estatecore-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
