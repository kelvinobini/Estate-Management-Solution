name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test
        run: npm run test:cov

      - name: Build
        run: npm run build

  api-docker-build:
    name: API Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This is the only place the Dockerfile actually gets built and
      # verified — there's no Docker available in the environment this
      # project was developed in, so this job is the real check for it.
      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: estatecore-api:ci

  web:
    name: Web — lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      # Needs *a* value for every server-only env var the app reads at build
      # time — no live backend is available in CI, and none of the routes
      # touched here call out to it at build time, so any placeholder works.
      - name: Build
        run: npm run build
        env:
          API_URL: http://localhost:3000

  mobile:
    name: Mobile — typecheck, doctor, bundle export
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [mobile-tenant, mobile-landlord, mobile-field-staff, mobile-visitor]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # The real verification ceiling for these apps: no simulator/device is
      # available in CI (or in the sandbox this project was built in), so
      # expo-doctor + a real Metro production bundle export is what stands
      # in for "does this app actually build and does every import resolve."
      - name: expo-doctor
        run: npx expo-doctor

      - name: Bundle export (iOS)
        run: npx expo export --platform ios --output-dir /tmp/${{ matrix.app }}-export
